# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - GameCoreBackend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      # Ejecutamos el restore apuntando a la carpeta del backend
      - name: Restore dependencies
        run: dotnet restore ./backend

      # Compilamos el proyecto dentro de la carpeta /backend
      - name: Build with dotnet
        run: dotnet build ./backend --configuration Release --no-restore

      # Publicamos los archivos listos para producción en una carpeta temporal 'publish_output'
      - name: dotnet publish
        run: dotnet publish ./backend -c Release -o ./publish_output

      # Subimos esa carpeta como un artefacto para el siguiente Job
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ./publish_output

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      # Descargamos los archivos compilados en una carpeta llamada 'deploy_dir'
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: ./deploy_dir

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2CA4B1A32744498B97F612985B3B1D4D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6F8BA954A11A48FDBCA3BC5AD74AB30D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5AB8343F0595463DB1DC4DB8F24446C2 }}

      # Desplegamos indicando que el paquete está en './deploy_dir'
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "GameCoreBackend"
          slot-name: "Production"
          package: ./deploy_dir
